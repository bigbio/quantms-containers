name: QuantMS Containers Build and Sync

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    paths:
      - "diann-*/Dockerfile"
      - "relink-*/Dockerfile"
      - ".github/workflows/**"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push images to registry"
        required: false
        default: true
        type: "boolean"
      push_release:
        description: "Push as release version"
        required: false
        default: false
        type: boolean

jobs:
  # ── Detect which Dockerfiles changed ───────────────────────────────────
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        with:
          filters: |
            diann-2.2.0:  [ 'diann-2.2.0/**' ]
            diann-2.1.0:  [ 'diann-2.1.0/**' ]
            diann-2.0:    [ 'diann-2.0/**' ]
            diann-1.9.2:  [ 'diann-1.9.2/**' ]
            diann-1.8.1:  [ 'diann-1.8.1/**' ]
            relink-1.0.0: [ 'relink-1.0.0/**' ]

      - name: Build matrix from changes
        id: set-matrix
        run: |
          # Full list of all containers
          ALL='[
            {"context":"diann-2.2.0","tag":"ghcr.io/bigbio/diann:2.2.0","sif":"diann-sif:2.2.0","extra_tags":""},
            {"context":"diann-2.1.0","tag":"ghcr.io/bigbio/diann:2.1.0","sif":"diann-sif:2.1.0","extra_tags":"ghcr.io/bigbio/diann:latest"},
            {"context":"diann-2.0","tag":"ghcr.io/bigbio/diann:2.0.2","sif":"diann-sif:2.0.2","extra_tags":""},
            {"context":"diann-1.9.2","tag":"ghcr.io/bigbio/diann:1.9.2","sif":"diann-sif:1.9.2","extra_tags":""},
            {"context":"diann-1.8.1","tag":"ghcr.io/bigbio/diann:1.8.1","sif":"diann-sif:1.8.1","extra_tags":""},
            {"context":"relink-1.0.0","tag":"ghcr.io/bigbio/relink:1.0.0","sif":"relink-sif:1.0.0","extra_tags":"ghcr.io/bigbio/relink:latest"}
          ]'

          # On release/dispatch → build all; on push/PR → only changed
          if [[ "${{ github.event_name }}" == "release" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "matrix={\"include\":$(echo "$ALL" | jq -c '.')}" >> $GITHUB_OUTPUT
          else
            FILTERED=$(echo "$ALL" | jq -c '[.[] | select(
              (.context == "diann-2.2.0"  and "${{ steps.filter.outputs.diann-2_2_0 || 'false' }}" == "true") or
              (.context == "diann-2.1.0"  and "${{ steps.filter.outputs.diann-2_1_0 || 'false' }}" == "true") or
              (.context == "diann-2.0"    and "${{ steps.filter.outputs.diann-2_0 || 'false' }}" == "true") or
              (.context == "diann-1.9.2"  and "${{ steps.filter.outputs.diann-1_9_2 || 'false' }}" == "true") or
              (.context == "diann-1.8.1"  and "${{ steps.filter.outputs.diann-1_8_1 || 'false' }}" == "true") or
              (.context == "relink-1.0.0" and "${{ steps.filter.outputs.relink-1_0_0 || 'false' }}" == "true")
            )]')
            if [[ "$FILTERED" == "[]" ]]; then
              echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            else
              echo "matrix={\"include\":$FILTERED}" >> $GITHUB_OUTPUT
            fi
          fi

  # ── Build & push containers (one job per changed Dockerfile) ───────────
  build:
    name: "Build ${{ matrix.context }}"
    needs: detect-changes
    if: fromJSON(needs.detect-changes.outputs.matrix).include[0] != null
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ matrix.tag }}
            ${{ matrix.extra_tags }}
          cache-from: type=gha,scope=${{ matrix.context }}
          cache-to: type=gha,scope=${{ matrix.context }},mode=max
          provenance: false

      - name: Convert to Singularity and push
        if: github.event_name != 'pull_request'
        run: |
          # Install Singularity
          sudo apt-get update && sudo apt-get install -y singularity-container || true

          # Convert Docker → SIF
          docker save ${{ matrix.tag }} -o image.tar
          singularity build image.sif docker-archive://image.tar

          # Push SIF to GHCR
          echo "${{ secrets.GHCR_TOKEN }}" | singularity remote login -u ${{ secrets.GHCR_USERNAME }} --password-stdin oras://ghcr.io
          singularity push image.sif oras://ghcr.io/bigbio/${{ matrix.sif }}

          # Push latest SIF tag on release
          if [[ "${{ github.event_name }}" == "release" && -n "${{ matrix.extra_tags }}" ]]; then
            SIF_LATEST=$(echo "${{ matrix.sif }}" | sed 's/:[^:]*$/:latest/')
            singularity push image.sif oras://ghcr.io/bigbio/$SIF_LATEST
          fi

  # ── Sync OpenMS containers ─────────────────────────────────────────────
  sync-openms:
    name: Sync OpenMS Containers
    needs: build
    if: always() && (github.event_name == 'release' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      OPENMS_VERSION: "2025.04.14"

    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull, tag, and push OpenMS Docker
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            docker pull ghcr.io/openms/openms-tools-thirdparty:latest
            docker tag ghcr.io/openms/openms-tools-thirdparty:latest ghcr.io/bigbio/openms-tools-thirdparty:${{ env.OPENMS_VERSION }}
            docker push ghcr.io/bigbio/openms-tools-thirdparty:${{ env.OPENMS_VERSION }}

      - name: Tag as latest on release
        if: github.event_name == 'release'
        run: |
          docker tag ghcr.io/openms/openms-tools-thirdparty:latest ghcr.io/bigbio/openms-tools-thirdparty:latest
          docker push ghcr.io/bigbio/openms-tools-thirdparty:latest

      - name: Sync OpenMS Singularity
        run: |
          sudo apt-get update && sudo apt-get install -y singularity-container || true
          echo "${{ secrets.GHCR_TOKEN }}" | singularity remote login -u ${{ secrets.GHCR_USERNAME }} --password-stdin oras://ghcr.io
          singularity pull --force openms.sif oras://ghcr.io/openms/openms-tools-thirdparty-sif:latest
          singularity push openms.sif oras://ghcr.io/bigbio/openms-tools-thirdparty-sif:${{ env.OPENMS_VERSION }}
          if [[ "${{ github.event_name }}" == "release" ]]; then
            singularity push openms.sif oras://ghcr.io/bigbio/openms-tools-thirdparty-sif:latest
          fi
